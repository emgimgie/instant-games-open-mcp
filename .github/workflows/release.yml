name: Release

on:
  push:
    branches:
      - main
      - beta
      - alpha
      - next
      - '1.x'
      - 'beta/*'

permissions:
  contents: write        # 创建 Git tags 和 GitHub Releases
  issues: write          # 在 Issues 中评论发布信息
  pull-requests: write   # 在 PR 中评论发布信息
  id-token: write        # npm trusted publishing (OIDC)

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      # ========== 1. 准备环境 ==========
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必需：获取完整 git 历史用于 semantic-release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # ========== 2. 质量检查 ==========
      - name: Lint code
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test
        continue-on-error: true
        # 测试失败不阻止发布（可根据需要调整）

      # ========== 3. 自动发布 ==========
      - name: Release with semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

      # ========== 4. 发布总结 ==========
      - name: Release summary
        if: success()
        run: |
          echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 代码检查通过" >> $GITHUB_STEP_SUMMARY
          echo "✅ 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "✅ 测试完成" >> $GITHUB_STEP_SUMMARY
          echo "✅ 版本已发布到 npm" >> $GITHUB_STEP_SUMMARY
          echo "✅ GitHub Release 已创建" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "查看发布详情：https://github.com/${{ github.repository }}/releases" >> $GITHUB_STEP_SUMMARY

      - name: Release failure
        if: failure()
        run: |
          echo "## ❌ Release Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "发布过程中出现错误，请检查日志。" >> $GITHUB_STEP_SUMMARY
